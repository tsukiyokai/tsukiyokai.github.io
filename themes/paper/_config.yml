
# html lang
language: zh

# main menu navigation
menu:
  Home: /
  About: /about

# stylesheets loaded in the <head>
stylesheets:

stylesheets_preload:
- https://cdn.bootcdn.net/ajax/libs/highlight.js/11.0.0-alpha0/styles/stackoverflow-dark.min.css
- https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&display=swap # for font

# scripts loaded in the end of the body
scripts_defer:
- https://cdn.bootcdn.net/ajax/libs/highlight.js/11.0.0-alpha0/highlight.min.js # for highlight
- /js/paper.js # for basic script


social:
  Github: https://github.com/tsukiyokai
  E-mail: mailto:tsukiyokai@hotmail.com
  # and more, you can add other link by the same way

# Uncomment to disable sidebar
#toc: false
#link: false
#archives: false
#categories: false
#tags: false

# theme color
main_color: forest # forest | grass | sky | sun | sea

# google Analytics
google_analytics_id: xx-xxxxxxx-xx

# commend module
comment:
  enable: false
  appId: your-app-id
